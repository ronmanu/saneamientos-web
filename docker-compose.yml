# =============================================================================
# DOCKER COMPOSE - Saneamientos Descatalogados
# =============================================================================
# Uso: docker-compose up -d
# Para reconstruir: docker-compose up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saneamientos-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - N8N_CONTACT_WEBHOOK_URL=${N8N_CONTACT_WEBHOOK_URL:-}
    # Healthcheck para monitoreo
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
